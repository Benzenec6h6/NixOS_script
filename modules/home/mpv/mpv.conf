# ▶ ハードウェアデコード設定
hwdec=nvdec
hwdec-codecs=all

# ▶ 出力ドライバ（Nvidiaに最適）
vo=gpu
gpu-api=vulkan
gpu-context=wayland

# ▶ 同期と画質
interpolation=yes
video-sync=display-resample
tscale=oversample

# ▶ 高品質スケーラー（GPUパワーを活かす）
scale=ewa_lanczossharp
cscale=ewa_lanczossharp

# ▶ 色管理
target-colorspace=bt.2020
icc-profile-auto=yes
icc-cache=yes

# ▶ 音声
audio-channels=auto-safe
volume-max=150

# ▶ 遅延最適化
cache=yes
demuxer-max-bytes=256MiB
demuxer-max-back-bytes=128MiB

# ▶ OSD
osd-font-size=28
osd-duration=2000

# ▶ スムーズな視聴体験
keep-open=yes
ytdl-format=bestvideo+bestaudio


###############
# Anime4K 設定
###############

# ★ anime-ultra：最高品質（RTX 3060 なら余裕あり）
[anime-ultra]
glsl-shaders="\
~~/shaders/Anime4K_Denoise_Bilateral_Median.glsl;\
~~/shaders/Anime4K_Deblur_DoG.glsl;\
~~/shaders/Anime4K_Restore_CNN_UL.glsl;\
~~/shaders/Anime4K_Upscale_CNN_x2_UL.glsl"

scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell


# ★ anime-high：一般視聴に最適（高品質・パフォーマンス良し）
[anime-high]
glsl-shaders="\
~~/shaders/Anime4K_Denoise_Bilateral_Median.glsl;\
~~/shaders/Anime4K_Restore_CNN_UL.glsl;\
~~/shaders/Anime4K_Upscale_CNN_x2_L.glsl"

scale=ewa_lanczos
cscale=ewa_lanczos


# ★ anime-light：軽量＋高速（ノートバッテリー使用時向け）
[anime-light]
glsl-shaders="\
~~/shaders/Anime4K_Deblur_DoG.glsl;\
~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"

scale=bilinear
cscale=bilinear

