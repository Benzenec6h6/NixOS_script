name: Weekly Nix Flake Update

on:
  schedule:
    # 毎週日曜日 00:00 (UTC) に実行
    - cron: '0 0 * * 0'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update flake.lock
        run: nix flake update

      - name: Create Pull Request or Push directly
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly nix flake update"
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: "Weekly Nix Flake Update"
          body: |
            This is an automated PR to update `flake.lock`.
            Garnix will build and cache the new dependencies once this is pushed/merged.
          branch: update-flake-lock
          delete-branch: true
